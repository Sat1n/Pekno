name: Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build and publish ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: pekno-hub
            target: app-runtime
            build_args: |
              BASE_IMAGE=python:3.13-slim
              EXECUTION_MODE=cpu
          - image: pekno-scheduler
            target: app-runtime
            build_args: |
              BASE_IMAGE=python:3.13-slim
              EXECUTION_MODE=cpu
          - image: pekno-nginx
            target: nginx-runtime
            build_args: ""
          - image: pekno-worker-cpu
            target: app-runtime
            build_args: |
              BASE_IMAGE=python:3.13-slim
              EXECUTION_MODE=cpu
          - image: pekno-worker-cuda12
            target: app-runtime
            build_args: |
              BASE_IMAGE=nvidia/cuda:12.2.2-cudnn8-runtime-ubuntu22.04
              EXECUTION_MODE=cuda

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.name }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
