services:
  postgres:
    volumes:
      - pgdata:/var/lib/postgresql/data

  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
      target: app-runtime
      args:
        BASE_IMAGE: python:3.13-slim
        EXECUTION_MODE: ${EXECUTION_MODE:-cpu}
    container_name: pekno-devcontainer
    command: ["sleep", "infinity"]
    working_dir: /workspace/Pekno
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pekno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pekno_password}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-pekno_iris}
      REDIS_URL: redis://redis:6379
      USE_REDIS: "True"
      APP_ENV: ${APP_ENV:-dev}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      EXECUTION_MODE: ${EXECUTION_MODE:-cpu}
      RUN_DB_MIGRATIONS: "0"
    volumes:
      - .:/workspace/Pekno:cached
      - ${DATA_DIR:-./data}:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
