services:
  hub:
    build:
      args:
        BASE_IMAGE: ${CUDA_APP_BASE_IMAGE:-nvidia/cuda:12.9.1-cudnn-runtime-ubuntu24.04}
        EXECUTION_MODE: cuda
    environment:
      EXECUTION_MODE: cuda
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    gpus: ${NVIDIA_VISIBLE_DEVICES:-all}

  worker:
    build:
      args:
        BASE_IMAGE: ${CUDA_WORKER_BASE_IMAGE:-nvidia/cuda:12.9.1-cudnn-runtime-ubuntu24.04}
        EXECUTION_MODE: cuda
    environment:
      EXECUTION_MODE: cuda
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    gpus: ${NVIDIA_VISIBLE_DEVICES:-all}
