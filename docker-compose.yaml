services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx-runtime
    container_name: pekno-nginx
    depends_on:
      hub:
        condition: service_started
    ports:
      - "9080:80"

  hub:
    build:
      context: .
      dockerfile: Dockerfile
      target: app-runtime
      args:
        BASE_IMAGE: python:3.13-slim
        EXECUTION_MODE: cpu
    container_name: pekno-hub
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pekno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pekno_password}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-pekno}
      REDIS_URL: redis://redis:6379
      USE_REDIS: "True"
      APP_ENV: ${APP_ENV:-prod}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      RUN_DB_MIGRATIONS: "1"
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
    command: ["uv", "run", "python", "hub/main.py"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ${DATA_DIR:-./data}:/app/data
      - ${DATA_DIR:-./data}/plugins/third_party:/app/worker/plugins/third_party

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: app-runtime
    extends:
      file: worker.ml.yml
      service: ${WORKER_EXECUTION_MODE:-cpu} # set to one of [cpu, cuda, rocm] for worker-side ML acceleration
    container_name: pekno-worker
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pekno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pekno_password}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-pekno}
      REDIS_URL: redis://redis:6379
      USE_REDIS: "True"
      APP_ENV: ${APP_ENV:-prod}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      RUN_DB_MIGRATIONS: "0"
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
    command: ["uv", "run", "taskiq", "worker", "worker.main:broker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ${DATA_DIR:-./data}:/app/data
      - ${DATA_DIR:-./data}/plugins/third_party:/app/worker/plugins/third_party

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: app-runtime
      args:
        BASE_IMAGE: python:3.13-slim
        EXECUTION_MODE: cpu
    container_name: pekno-scheduler
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pekno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pekno_password}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-pekno}
      REDIS_URL: redis://redis:6379
      USE_REDIS: "True"
      APP_ENV: ${APP_ENV:-prod}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      RUN_DB_MIGRATIONS: "0"
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
    command: ["sh", "-lc", "uv run python scripts/scheduler_bootstrap.py && uv run taskiq scheduler worker.main:scheduler"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ${DATA_DIR:-./data}:/app/data
      - ${DATA_DIR:-./data}/plugins/third_party:/app/worker/plugins/third_party

  redis:
    image: redis:7-alpine
    container_name: pekno-redis

  postgres:
    image: ankane/pgvector:latest
    container_name: pekno-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pekno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pekno_password}
      POSTGRES_DB: ${POSTGRES_DB:-pekno}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pekno} -d ${POSTGRES_DB:-pekno}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data

networks:
  default:
    name: pekno-network
