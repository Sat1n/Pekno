services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx-runtime
    container_name: pekno-nginx
    depends_on:
      hub:
        condition: service_started
    ports:
      - "80:80"

  hub:
    build:
      context: .
      dockerfile: Dockerfile
      target: app-runtime
      args:
        BASE_IMAGE: python:3.13-slim
        EXECUTION_MODE: ${EXECUTION_MODE:-cpu}
    container_name: pekno-hub
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pekno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pekno_password}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-pekno_iris}
      REDIS_URL: redis://redis:6379
      USE_REDIS: "True"
      APP_ENV: ${APP_ENV:-prod}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      EXECUTION_MODE: ${EXECUTION_MODE:-cpu}
      RUN_DB_MIGRATIONS: "1"
    command: ["uv", "run", "python", "hub/main.py"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./data:/app/data

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: app-runtime
      args:
        BASE_IMAGE: ${WORKER_BASE_IMAGE:-python:3.13-slim}
        EXECUTION_MODE: ${EXECUTION_MODE:-cpu}
    container_name: pekno-worker
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pekno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pekno_password}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-pekno_iris}
      REDIS_URL: redis://redis:6379
      USE_REDIS: "True"
      APP_ENV: ${APP_ENV:-prod}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      EXECUTION_MODE: ${EXECUTION_MODE:-cpu}
      RUN_DB_MIGRATIONS: "0"
    command: ["uv", "run", "taskiq", "worker", "worker.main:broker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./data:/app/data
    # Uncomment the block below on NVIDIA hosts to enable GPU passthrough.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: app-runtime
      args:
        BASE_IMAGE: python:3.13-slim
        EXECUTION_MODE: ${EXECUTION_MODE:-cpu}
    container_name: pekno-scheduler
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pekno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pekno_password}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-pekno_iris}
      REDIS_URL: redis://redis:6379
      USE_REDIS: "True"
      APP_ENV: ${APP_ENV:-prod}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Shanghai}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      EXECUTION_MODE: ${EXECUTION_MODE:-cpu}
      RUN_DB_MIGRATIONS: "0"
    command: ["uv", "run", "taskiq", "scheduler", "worker.main:scheduler"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./data:/app/data

  redis:
    image: redis:7-alpine
    container_name: pekno-redis

  postgres:
    image: ankane/pgvector:latest
    container_name: pekno-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pekno}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pekno_password}
      POSTGRES_DB: ${POSTGRES_DB:-pekno_iris}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pekno} -d ${POSTGRES_DB:-pekno_iris}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
